<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    height: 100%;
    overflow: hidden;
}

video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
}
</style>

</head>
<body>

<video id="player" autoplay controls>
    <source src="borneo.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("player");

// Tap / Click to Play Pause
video.addEventListener("click", function(){
    if(video.paused){
        video.play();
    }else{
        video.pause();
    }
});

// Auto Fullscreen
window.onload = function(){
    if(video.requestFullscreen){
        video.requestFullscreen();
    }
}
</script>

</body>
</html>
