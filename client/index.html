<script>
const ipBox = document.getElementById('ip-box');
const ipFeedback = document.getElementById('ip-feedback');
const serverFeedback = document.getElementById('server-feedback');

function copyToClipboard(text){
  if(navigator.clipboard){
    return navigator.clipboard.writeText(text);
  }
}

/* IP Copy */
function copyIP(){
  const ip = ipBox.dataset.ip;
  copyToClipboard(ip).then(()=>{
    ipFeedback.textContent = "Copied ✓";
    ipFeedback.className = "feedback ok";
    setTimeout(()=> ipFeedback.textContent="",1500);
  });
}

ipBox.addEventListener('click', copyIP);
ipBox.addEventListener('keydown', e=>{
  if(e.key==="Enter" || e.key===" "){
    e.preventDefault();
    copyIP();
  }
});

/* Server Copy */
function copyText(){
  const text = document.getElementById("myInput").value;
  copyToClipboard(text).then(()=>{
    serverFeedback.textContent = "Copied ✓";
    serverFeedback.className = "feedback ok";
    setTimeout(()=> serverFeedback.textContent="",1500);
  });
}
</script>
