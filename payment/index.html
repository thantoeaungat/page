<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  text-align: center;
  margin: 0;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

h2 {
  margin-bottom: 10px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  margin-bottom: 20px;
}

.qr {
  width: 180px;
  margin: 10px auto;
}

button {
  background: #4CAF50;
  color: white;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #45a049;
}

.note {
  font-size: 14px;
  color: gray;
}
</style>

</head>

<body>

<div class="container">

<h2>💸 ငွေပေးချေရန်</h2>
<p class="note">QR ကို scan လုပ်ပြီး ငွေလွှဲပါ</p>

<div class="card">
  <h3>KPay</h3>
  <img src="kpay.png" class="qr">
</div>

<div class="card">
  <h3>Wave Pay</h3>
  <img src="wave.png" class="qr">
</div>

<div class="card">
  <h3>Aya Pay</h3>
  <img src="aya.png" class="qr">
</div>

<p class="note">
ငွေလွှဲပြီးပါက Screenshot တင်ပေးပါ
</p>

<a href="https://forms.gle/YOUR_FORM_LINK" target="_blank">
  <button>📤 Screenshot တင်ရန်</button>
</a>

</div>

</body>
</html>
