<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment UI</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;

  background: linear-gradient(-45deg, #4CAF50, #00c6ff, #6a11cb, #2e7d32);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* HEADER */
.header {
  padding: 30px 20px 10px;
  color: white;
}

.header h1 {
  margin-bottom: 5px;
}

.header p {
  opacity: 0.9;
}

/* GRID CENTER */
.grid {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  padding: 20px;
}

/* CARD */
.card {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 25px;
  width: 220px;
  color: white;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

/* BIG QR */
.qr {
  width: 180px;
  margin: 15px 0;
}

/* COPY BUTTON */
.copy-btn {
  padding: 8px 12px;
  border: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.3);
  color: white;
  cursor: pointer;
}

.copy-btn:hover {
  background: rgba(255,255,255,0.5);
}

/* SUBMIT BUTTON */
.submit-btn {
  margin: 20px auto;
  padding: 14px 25px;
  border: none;
  border-radius: 12px;
  background: white;
  cursor: pointer;
  display: block;
}

/* NOTE */
.note {
  color: white;
  font-size: 14px;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: black;
  color: white;
  padding: 10px 15px;
  border-radius: 8px;
  opacity: 0;
  transition: 0.3s;
}

.toast.show {
  opacity: 1;
}
</style>

</head>

<body>

<!-- TOP HEADER -->
<div class="header">
  <h1>💸 Payment</h1>
  <p>QR ကို scan လုပ်ပြီး ငွေပေးချေပါ</p>
</div>

<!-- CENTER QR -->
<div class="grid">

  <div class="card">
    <h3>KPay</h3>
    <p id="kpay">09445220700</p>
	<p>Daw Myint Myint Cho</p>
    <button class="copy-btn" onclick="copyText('kpay')">📋 Copy</button>
    <img src="kpay.png" class="qr">
  </div>

  <div class="card">
    <h3>Wave Pay</h3>
    <p id="wave">09781541005</p>
	<p>Than Toe Aung</p>
    <button class="copy-btn" onclick="copyText('wave')">📋 Copy</button>
    <img src="wave.png" class="qr">
  </div>

  <div class="card">
    <h3>AYA Pay</h3>
    <p id="aya">09989899010</p>
	<p>Than Toe Aung</p>
    <button class="copy-btn" onclick="copyText('aya')">📋 Copy</button>
    <img src="aya.png" class="qr">
  </div>

</div>

<p class="note">
  ငွေလွှဲပြီးပါက Screenshot ပို့ပေးပါ
</p>

<a href="http://m.me/thantoeaungat" target="_blank">
  <button class="submit-btn">📤 Screenshot ပို့ရန်</button>
</a>

<!-- TOAST -->
<div id="toast" class="toast">Copied</div>

<script>
function copyText(id) {
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);

  const toast = document.getElementById("toast");
  toast.innerText = "Copied: " + text;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2000);
}
</script>

</body>
</html>
