<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ကော်ဖီဝယ်ပေးပါ ☕</title>

  <style>
    body {
      margin: 0;
      font-family: "Pyidaungsu", Arial, sans-serif;
      background: #f0f2f5;
    }

    /* cover photo */
    .cover {
      height: 180px;
      background: linear-gradient(135deg, #1877f2, #4da6ff);
    }

    /* profile */
    .profile {
      text-align: center;
      margin-top: -60px;
    }

    .profile img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 4px solid white;
      object-fit: cover;
    }

    .name {
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
    }

    .bio {
      color: #555;
      font-size: 14px;
      margin-bottom: 15px;
    }

    /* card */
    .card {
      background: white;
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    .qr {
      width: 200px;
      border-radius: 12px;
      margin: 15px 0;
      animation: float 2s infinite ease-in-out;
    }

    .btn {
      background: #1877f2;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0f5dc2;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0); }
    }
  </style>
</head>

<body>

<!-- Cover -->
<div class="cover"></div>

<!-- Profile -->
<div class="profile">
  <img src="profile.jpg" alt="Profile">
  <div class="name">TTA</div>
  <div class="bio">Content Creator | Developer</div>
</div>

<!-- Donate Card -->
<div class="card">
  <h3>☕ ကော်ဖီဝယ်ပေးပါ</h3>
  <p>ကျွန်တော့်ကို support လုပ်ချင်ရင် QR scan လုပ်ပါ 🙏</p>

  <img src="qr-code.jpg" class="qr" alt="QR Code">

  <p><b>KBZPay / WavePay</b></p>

  <button class="btn" onclick="thankYou()">Support လုပ်မယ် 💙</button>
</div>

<script>
  function thankYou() {
    alert("ကျေးဇူးအများကြီးတင်ပါတယ် ☕💙");
  }
</script>

</body>
</html>
